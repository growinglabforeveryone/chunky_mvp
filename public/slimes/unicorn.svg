<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <!-- Shadow (rainbow tinted) -->
  <ellipse cx="36" cy="66" rx="20" ry="4" fill="rgba(180,100,255,0.15)"/>
  <!-- Body -->
  <rect x="7" y="13" width="58" height="46" rx="22" fill="#C088E0"/>
  <rect x="7" y="13" width="58" height="46" rx="22" fill="none" stroke="rgba(0,0,0,0.10)" stroke-width="2"/>
  <!-- Highlight -->
  <rect x="13" y="19" width="15" height="8" rx="4" fill="rgba(255,255,255,0.45)"/>
  <!-- Unicorn horn (pixel) -->
  <rect x="33" y="5" width="6" height="4" fill="#FFD700" shape-rendering="crispEdges"/>
  <rect x="34" y="1" width="4" height="4" fill="#FFD700" shape-rendering="crispEdges"/>
  <rect x="35" y="-2" width="2" height="3" fill="#FFD700" shape-rendering="crispEdges"/>
  <!-- Horn stripes -->
  <rect x="34" y="3" width="4" height="1.5" fill="#FFA500" shape-rendering="crispEdges" opacity="0.6"/>
  <rect x="35" y="0" width="2" height="1.5" fill="#FFA500" shape-rendering="crispEdges" opacity="0.6"/>
  <!-- Rainbow mane (left side of head) -->
  <rect x="11" y="12" width="4" height="5" rx="1" fill="#FF6B6B" opacity="0.8"/>
  <rect x="9" y="17" width="4" height="5" rx="1" fill="#FFA94D" opacity="0.8"/>
  <rect x="8" y="22" width="4" height="5" rx="1" fill="#FFD93D" opacity="0.8"/>
  <rect x="7" y="27" width="4" height="5" rx="1" fill="#69DB7C" opacity="0.7"/>
  <rect x="8" y="32" width="4" height="5" rx="1" fill="#74C0FC" opacity="0.7"/>
  <!-- Sparkle effects -->
  <rect x="58" y="8" width="3" height="3" fill="#FFE566" shape-rendering="crispEdges" opacity="0.7"/>
  <rect x="63" y="14" width="2" height="2" fill="#FFE566" shape-rendering="crispEdges" opacity="0.5"/>
  <rect x="5" y="8" width="2" height="2" fill="#E8A0FF" shape-rendering="crispEdges" opacity="0.6"/>
  <rect x="60" y="24" width="2" height="2" fill="#E8A0FF" shape-rendering="crispEdges" opacity="0.5"/>
  <!-- Left eye (starry) -->
  <rect x="20" y="28" width="8" height="8" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="22" y="29" width="3" height="3" fill="white" shape-rendering="crispEdges"/>
  <rect x="24" y="33" width="2" height="2" fill="rgba(255,255,255,0.6)" shape-rendering="crispEdges"/>
  <!-- Right eye (starry) -->
  <rect x="44" y="28" width="8" height="8" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="46" y="29" width="3" height="3" fill="white" shape-rendering="crispEdges"/>
  <rect x="48" y="33" width="2" height="2" fill="rgba(255,255,255,0.6)" shape-rendering="crispEdges"/>
  <!-- Happy smile -->
  <rect x="26" y="42" width="4" height="3" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="30" y="44" width="4" height="3" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="34" y="45" width="4" height="3" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="38" y="44" width="4" height="3" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="42" y="42" width="4" height="3" fill="#1a2030" shape-rendering="crispEdges"/>
  <!-- Cheeks (pink glow) -->
  <ellipse cx="17" cy="38" rx="5" ry="3.5" fill="rgba(255,150,200,0.35)"/>
  <ellipse cx="55" cy="38" rx="5" ry="3.5" fill="rgba(255,150,200,0.35)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <!-- Shadow -->
  <ellipse cx="36" cy="66" rx="20" ry="4" fill="rgba(0,0,0,0.12)"/>
  <!-- Body -->
  <rect x="7" y="13" width="58" height="46" rx="22" fill="#8AAEC0"/>
  <rect x="7" y="13" width="58" height="46" rx="22" fill="none" stroke="rgba(0,0,0,0.10)" stroke-width="2"/>
  <!-- Highlight -->
  <rect x="13" y="19" width="15" height="8" rx="4" fill="rgba(255,255,255,0.40)"/>
  <!-- Left eye -->
  <rect x="20" y="28" width="8" height="8" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="22" y="30" width="3" height="3" fill="white" shape-rendering="crispEdges"/>
  <!-- Right eye -->
  <rect x="44" y="28" width="8" height="8" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="46" y="30" width="3" height="3" fill="white" shape-rendering="crispEdges"/>
  <!-- Simple smile -->
  <rect x="28" y="42" width="4" height="3" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="32" y="44" width="8" height="3" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="40" y="42" width="4" height="3" fill="#1a2030" shape-rendering="crispEdges"/>
</svg>

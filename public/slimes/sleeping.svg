<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <!-- Shadow -->
  <ellipse cx="36" cy="66" rx="20" ry="4" fill="rgba(0,0,0,0.12)"/>
  <!-- Body -->
  <rect x="7" y="13" width="58" height="46" rx="22" fill="#508898"/>
  <rect x="7" y="13" width="58" height="46" rx="22" fill="none" stroke="rgba(0,0,0,0.10)" stroke-width="2"/>
  <!-- Highlight -->
  <rect x="13" y="19" width="15" height="8" rx="4" fill="rgba(255,255,255,0.35)"/>
  <!-- Left eye closed (arc down = closed eye) -->
  <rect x="20" y="33" width="4" height="4" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="24" y="31" width="4" height="4" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="28" y="33" width="4" height="4" fill="#1a2030" shape-rendering="crispEdges"/>
  <!-- Right eye closed -->
  <rect x="44" y="33" width="4" height="4" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="48" y="31" width="4" height="4" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="52" y="33" width="4" height="4" fill="#1a2030" shape-rendering="crispEdges"/>
  <!-- Sleeping O mouth -->
  <rect x="30" y="42" width="12" height="3" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="28" y="43" width="4" height="6" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="40" y="43" width="4" height="6" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="30" y="47" width="12" height="3" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="32" y="43" width="8" height="6" fill="#7A5555" shape-rendering="crispEdges"/>
  <!-- Z Z Z (pixel letters) -->
  <!-- Large Z -->
  <rect x="54" y="9"  width="9" height="2" fill="#A8D0E0" shape-rendering="crispEdges"/>
  <rect x="60" y="11" width="3" height="2" fill="#A8D0E0" shape-rendering="crispEdges"/>
  <rect x="57" y="13" width="3" height="2" fill="#A8D0E0" shape-rendering="crispEdges"/>
  <rect x="54" y="15" width="9" height="2" fill="#A8D0E0" shape-rendering="crispEdges"/>
  <!-- Small Z -->
  <rect x="62" y="3"  width="6" height="1.5" fill="#A8D0E0" shape-rendering="crispEdges"/>
  <rect x="66" y="4.5" width="2" height="1.5" fill="#A8D0E0" shape-rendering="crispEdges"/>
  <rect x="64" y="6"  width="2" height="1.5" fill="#A8D0E0" shape-rendering="crispEdges"/>
  <rect x="62" y="7.5" width="6" height="1.5" fill="#A8D0E0" shape-rendering="crispEdges"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <!-- Shadow -->
  <ellipse cx="36" cy="66" rx="20" ry="4" fill="rgba(0,0,0,0.12)"/>
  <!-- Body -->
  <rect x="7" y="13" width="58" height="46" rx="22" fill="#7BC8D8"/>
  <rect x="7" y="13" width="58" height="46" rx="22" fill="none" stroke="rgba(0,0,0,0.10)" stroke-width="2"/>
  <!-- Highlight -->
  <rect x="13" y="19" width="15" height="8" rx="4" fill="rgba(255,255,255,0.40)"/>
  <!-- Glasses frame -->
  <rect x="16" y="25" width="16" height="14" rx="3" fill="none" stroke="#3a3a5a" stroke-width="2.5"/>
  <rect x="40" y="25" width="16" height="14" rx="3" fill="none" stroke="#3a3a5a" stroke-width="2.5"/>
  <!-- Glasses bridge -->
  <rect x="32" y="30" width="8" height="2.5" fill="#3a3a5a" shape-rendering="crispEdges"/>
  <!-- Glasses lens tint -->
  <rect x="17" y="26" width="14" height="12" rx="2" fill="rgba(180,220,255,0.20)"/>
  <rect x="41" y="26" width="14" height="12" rx="2" fill="rgba(180,220,255,0.20)"/>
  <!-- Left eye (behind glasses) -->
  <rect x="21" y="29" width="7" height="7" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="23" y="31" width="3" height="3" fill="white" shape-rendering="crispEdges"/>
  <!-- Right eye (behind glasses) -->
  <rect x="44" y="29" width="7" height="7" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="46" y="31" width="3" height="3" fill="white" shape-rendering="crispEdges"/>
  <!-- Smart smile -->
  <rect x="28" y="44" width="4" height="3" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="32" y="46" width="8" height="3" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="40" y="44" width="4" height="3" fill="#1a2030" shape-rendering="crispEdges"/>
</svg>

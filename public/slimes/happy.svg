<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <!-- Shadow -->
  <ellipse cx="36" cy="66" rx="20" ry="4" fill="rgba(0,0,0,0.12)"/>
  <!-- Body -->
  <rect x="7" y="13" width="58" height="46" rx="22" fill="#5CC8B8"/>
  <rect x="7" y="13" width="58" height="46" rx="22" fill="none" stroke="rgba(0,0,0,0.10)" stroke-width="2"/>
  <!-- Highlight -->
  <rect x="13" y="19" width="15" height="8" rx="4" fill="rgba(255,255,255,0.40)"/>
  <!-- Left eye -->
  <rect x="20" y="28" width="8" height="8" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="22" y="30" width="3" height="3" fill="white" shape-rendering="crispEdges"/>
  <!-- Right eye -->
  <rect x="44" y="28" width="8" height="8" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="46" y="30" width="3" height="3" fill="white" shape-rendering="crispEdges"/>
  <!-- Happy mouth (pixel smile arc) -->
  <rect x="24" y="40" width="4" height="4" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="28" y="43" width="4" height="4" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="32" y="45" width="8" height="4" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="40" y="43" width="4" height="4" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="44" y="40" width="4" height="4" fill="#1a2030" shape-rendering="crispEdges"/>
  <!-- Cheeks -->
  <ellipse cx="17" cy="37" rx="6" ry="4" fill="rgba(255,150,150,0.38)"/>
  <ellipse cx="55" cy="37" rx="6" ry="4" fill="rgba(255,150,150,0.38)"/>
</svg>

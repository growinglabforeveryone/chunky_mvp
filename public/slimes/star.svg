<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <!-- Shadow -->
  <ellipse cx="36" cy="66" rx="20" ry="4" fill="rgba(0,0,0,0.12)"/>
  <!-- Body -->
  <rect x="7" y="13" width="58" height="46" rx="22" fill="#A8D080"/>
  <rect x="7" y="13" width="58" height="46" rx="22" fill="none" stroke="rgba(0,0,0,0.10)" stroke-width="2"/>
  <!-- Highlight -->
  <rect x="13" y="19" width="15" height="8" rx="4" fill="rgba(255,255,255,0.40)"/>
  <!-- Star above head -->
  <polygon points="36,0 38.5,6 45,7 40,11 41.5,18 36,14 30.5,18 32,11 27,7 33.5,6" fill="#FFD700"/>
  <polygon points="36,0 38.5,6 45,7 40,11 41.5,18 36,14 30.5,18 32,11 27,7 33.5,6" fill="none" stroke="rgba(0,0,0,0.10)" stroke-width="1"/>
  <!-- Sparkle dots -->
  <rect x="12" y="10" width="3" height="3" fill="#FFE566" shape-rendering="crispEdges" opacity="0.8"/>
  <rect x="58" y="6" width="3" height="3" fill="#FFE566" shape-rendering="crispEdges" opacity="0.8"/>
  <rect x="8" y="22" width="2" height="2" fill="#FFE566" shape-rendering="crispEdges" opacity="0.5"/>
  <rect x="62" y="18" width="2" height="2" fill="#FFE566" shape-rendering="crispEdges" opacity="0.5"/>
  <!-- Left eye -->
  <rect x="20" y="28" width="8" height="8" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="22" y="30" width="3" height="3" fill="white" shape-rendering="crispEdges"/>
  <!-- Right eye -->
  <rect x="44" y="28" width="8" height="8" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="46" y="30" width="3" height="3" fill="white" shape-rendering="crispEdges"/>
  <!-- Happy smile -->
  <rect x="26" y="42" width="4" height="3" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="30" y="44" width="4" height="3" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="34" y="45" width="4" height="3" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="38" y="44" width="4" height="3" fill="#1a2030" shape-rendering="crispEdges"/>
  <rect x="42" y="42" width="4" height="3" fill="#1a2030" shape-rendering="crispEdges"/>
  <!-- Cheeks -->
  <ellipse cx="17" cy="38" rx="5" ry="3.5" fill="rgba(255,150,150,0.30)"/>
  <ellipse cx="55" cy="38" rx="5" ry="3.5" fill="rgba(255,150,150,0.30)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80"  r="200" fill="#ffffff" opacity="0.04"/>
  <circle cx="100"  cy="560" r="160" fill="#ffffff" opacity="0.04"/>

  <!-- Pixel crown slime — centered, scaled up ~3.5x from 72x72 viewBox -->
  <g transform="translate(348, 30) scale(3.5)" shape-rendering="crispEdges">
    <!-- Shadow -->
    <ellipse cx="36" cy="66" rx="20" ry="4" fill="rgba(0,0,0,0.12)" shape-rendering="auto"/>
    <!-- Crown -->
    <rect x="22" y="7"  width="28" height="7"  fill="#F0C030"/>
    <rect x="22" y="2"  width="6"  height="8"  fill="#F0C030"/>
    <rect x="33" y="0"  width="6"  height="8"  fill="#F0C030"/>
    <rect x="44" y="2"  width="6"  height="8"  fill="#F0C030"/>
    <rect x="22" y="7"  width="28" height="7"  fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1.5"/>
    <!-- Crown gems -->
    <rect x="25" y="9"  width="4"  height="4"  fill="#E87070"/>
    <rect x="34" y="9"  width="4"  height="4"  fill="#70B8E8"/>
    <rect x="43" y="9"  width="4"  height="4"  fill="#E87070"/>
    <!-- Body -->
    <rect x="7"  y="13" width="58" height="46" rx="22" fill="#60C870"/>
    <rect x="7"  y="13" width="58" height="46" rx="22" fill="none" stroke="rgba(0,0,0,0.10)" stroke-width="2"/>
    <!-- Highlight -->
    <rect x="13" y="19" width="15" height="8"  rx="4"  fill="rgba(255,255,255,0.40)"/>
    <!-- Left eye -->
    <rect x="20" y="30" width="8"  height="5"  fill="#1a2030"/>
    <rect x="22" y="31" width="3"  height="2"  fill="white"/>
    <!-- Right eye -->
    <rect x="44" y="30" width="8"  height="5"  fill="#1a2030"/>
    <rect x="46" y="31" width="3"  height="2"  fill="white"/>
    <!-- Smile -->
    <rect x="26" y="41" width="4"  height="4"  fill="#1a2030"/>
    <rect x="30" y="43" width="12" height="4"  fill="#1a2030"/>
    <rect x="42" y="41" width="4"  height="4"  fill="#1a2030"/>
  </g>

  <!-- App name -->
  <text x="600" y="420" font-family="Nunito, Arial Black, sans-serif" font-weight="800" font-size="100" fill="white" text-anchor="middle" letter-spacing="-2">Chunky</text>

  <!-- Divider -->
  <rect x="430" y="440" width="340" height="3" rx="2" fill="#60C870" opacity="0.8"/>

  <!-- Description -->
  <text x="600" y="492" font-family="Arial, sans-serif" font-size="30" fill="white" opacity="0.85" text-anchor="middle">영어 단어뭉치 학습 앱</text>

  <!-- Feature pills -->
  <rect x="340" y="528" width="220" height="48" rx="24" fill="#60C870" opacity="0.2"/>
  <text x="450" y="559" font-family="Arial, sans-serif" font-size="22" fill="white" opacity="0.9" text-anchor="middle">📺 영상으로 학습</text>

  <rect x="640" y="528" width="220" height="48" rx="24" fill="#60C870" opacity="0.2"/>
  <text x="750" y="559" font-family="Arial, sans-serif" font-size="22" fill="white" opacity="0.9" text-anchor="middle">🧠 AI 청킹</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="#ffffff" opacity="0.04"/>
  <circle cx="150" cy="530" r="160" fill="#ffffff" opacity="0.04"/>
  <circle cx="980" cy="520" r="120" fill="#5CC8B8" opacity="0.12"/>

  <!-- Slime character (left side) -->
  <g transform="translate(160, 140) scale(0.9)">
    <!-- Slime body -->
    <ellipse cx="170" cy="230" rx="130" ry="110" fill="#5CC8B8"/>
    <!-- Slime top bump -->
    <ellipse cx="170" cy="150" rx="95" ry="85" fill="#5CC8B8"/>
    <!-- Side bumps -->
    <ellipse cx="62" cy="210" rx="48" ry="40" fill="#5CC8B8"/>
    <ellipse cx="278" cy="210" rx="48" ry="40" fill="#5CC8B8"/>
    <!-- Bottom drip -->
    <ellipse cx="170" cy="325" rx="80" ry="30" fill="#5CC8B8"/>
    <!-- Eyes -->
    <ellipse cx="142" cy="165" rx="14" ry="16" fill="#1a1a2e"/>
    <ellipse cx="198" cy="165" rx="14" ry="16" fill="#1a1a2e"/>
    <!-- Eye shine -->
    <circle cx="148" cy="159" r="5" fill="white"/>
    <circle cx="204" cy="159" r="5" fill="white"/>
    <!-- Smile -->
    <path d="M 142 195 Q 170 218 198 195" stroke="#1a1a2e" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Cheeks -->
    <ellipse cx="122" cy="202" rx="18" ry="10" fill="#4ABFAF" opacity="0.7"/>
    <ellipse cx="218" cy="202" rx="18" ry="10" fill="#4ABFAF" opacity="0.7"/>
  </g>

  <!-- Right side: text content -->
  <!-- App name -->
  <text x="600" y="220" font-family="Nunito, Arial Black, sans-serif" font-weight="800" font-size="100" fill="white" text-anchor="middle" letter-spacing="-2">Chunky</text>

  <!-- Divider line -->
  <rect x="430" y="248" width="340" height="3" rx="2" fill="#5CC8B8" opacity="0.8"/>

  <!-- Description -->
  <text x="600" y="310" font-family="Arial, sans-serif" font-size="32" fill="white" opacity="0.85" text-anchor="middle">영어 단어뭉치 학습 앱</text>

  <!-- Feature pills -->
  <rect x="390" y="360" width="220" height="52" rx="26" fill="#5CC8B8" opacity="0.25"/>
  <text x="500" y="393" font-family="Arial, sans-serif" font-size="22" fill="white" opacity="0.9" text-anchor="middle">📺 영상으로 학습</text>

  <rect x="630" y="360" width="220" height="52" rx="26" fill="#5CC8B8" opacity="0.25"/>
  <text x="740" y="393" font-family="Arial, sans-serif" font-size="22" fill="white" opacity="0.9" text-anchor="middle">🧠 AI 청킹</text>

  <!-- URL -->
  <text x="600" y="530" font-family="Arial, sans-serif" font-size="26" fill="white" opacity="0.5" text-anchor="middle">getchunky.vercel.app</text>
</svg>

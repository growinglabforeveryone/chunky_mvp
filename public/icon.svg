<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#6366f1"/>

  <!-- Slime body -->
  <ellipse cx="256" cy="290" rx="130" ry="110" fill="#5CC8B8"/>
  <!-- Slime top bump -->
  <ellipse cx="256" cy="210" rx="95" ry="85" fill="#5CC8B8"/>
  <!-- Side bumps -->
  <ellipse cx="148" cy="270" rx="48" ry="40" fill="#5CC8B8"/>
  <ellipse cx="364" cy="270" rx="48" ry="40" fill="#5CC8B8"/>

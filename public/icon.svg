  <!-- Eyes -->
  <ellipse cx="228" cy="225" rx="14" ry="16" fill="#1a1a2e"/>
  <ellipse cx="284" cy="225" rx="14" ry="16" fill="#1a1a2e"/>
  <!-- Eye shine -->
  <circle cx="234" cy="219" r="5" fill="white"/>
  <circle cx="290" cy="219" r="5" fill="white"/>

  <!-- Smile -->
  <path d="M 228 255 Q 256 278 284 255" stroke="#1a1a2e" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="208" cy="262" rx="18" ry="10" fill="#4ABFAF" opacity="0.7"/>
  <ellipse cx="304" cy="262" rx="18" ry="10" fill="#4ABFAF" opacity="0.7"/>
